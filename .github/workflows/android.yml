name: Build APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    - name: Build APK
      run: |
        echo "Building APK..."
        mkdir -p build
        echo "Dummy build step completed"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: build
